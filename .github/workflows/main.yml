name: Build WebView APK
on:
  workflow_dispatch:
    inputs:
      homepage_url:
        description: "HTTPS网页地址"
        required: true
        default: "https://tv.ericse.dpdns.org/"
      app_name:
        description: "APP名称"
        default: "SEtv"
      package_id:
        description: "安卓包名(小写)"
        default: "vip.setv.free"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install JDK‑17 and Gradle
        run: sudo apt -y update && sudo apt -y install openjdk-17-jdk gradle git

      - name: Setup Node.js and install Cordova
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g cordova

      - name: Create Cordova project
        run: |
          cordova create project ${{ github.event.inputs.package_id }} ${{ github.event.inputs.app_name }}
          cd project
          cordova platform add android@13.0.0

      - name: Generate MainActivity.java
        env:
          URL: ${{ github.event.inputs.homepage_url }}
          pkg: ${{ github.event.inputs.package_id }}
        run: |
          pkg_path=$(echo "$pkg" | sed 's/\./\//g')
          mkdir -p project/platforms/android/app/src/main/java/"$pkg_path"
          cat > MainActivity.tpl << EOF
package __PKG__;
import android.os.Bundle;
import android.webkit.WebSettings;
import android.webkit.WebView;
import androidx.appcompat.app.AppCompatActivity;

public class MainActivity extends AppCompatActivity {
    private WebView webView;
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        webView = new WebView(this);
        WebSettings settings = webView.getSettings();
        settings.setJavaScriptEnabled(true);
        settings.setDomStorageEnabled(true);
        settings.setDatabaseEnabled(true);
        settings.setAllowFileAccess(true);
        settings.setCacheMode(WebSettings.LOAD_DEFAULT);
        settings.setUserAgentString("Mozilla/5.0 (Android; Mobile) AppleWebKit Chrome Mobile Safari");
        webView.loadUrl("__URL__");
        setContentView(webView);
    }
    @Override
    public void onBackPressed() {
        if(webView.canGoBack()){
            webView.goBack();
        }else{
            super.onBackPressed();
        }
    }
}
EOF
          sed -i "s|__PKG__|$pkg|g" MainActivity.tpl
          sed -i "s|__URL__|$URL|g" MainActivity.tpl
          mv MainActivity.tpl project/platforms/android/app/src/main/java/"$pkg_path"/MainActivity.java

      - name: Build release‑unsigned APK
        run: |
          cd project/platforms/android
          ./gradlew assembleRelease

      - name: Upload APK to Action Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: setv‑app‑unsigned
          path: project/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
